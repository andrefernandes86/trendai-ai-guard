name: TMAS Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tmas-scan:
    name: Artifact Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda deployment package
        run: |
          pip install -r src/requirements.txt -t package/
          cp src/*.py package/
          cd package && zip -r ../lambda.zip . && cd ..
          echo "Built lambda.zip ($(du -sh lambda.zip | cut -f1))"

      - name: Run TMAS Scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          artifact: lambda.zip
          vulnerabilitiesScan: "true"
          secretsScan: "true"
          malwareScan: "true"
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
