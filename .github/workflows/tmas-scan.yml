name: TMAS Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: trendai-ai-guard

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Lambda container image
        run: |
          cat > Dockerfile.scan <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/python:3.12
          COPY src/requirements.txt .
          RUN pip install -r requirements.txt -t "${LAMBDA_TASK_ROOT}"
          COPY src/ ${LAMBDA_TASK_ROOT}/
          DOCKERFILE
          docker build -f Dockerfile.scan -t ${{ env.IMAGE_NAME }}:latest .
          docker save ${{ env.IMAGE_NAME }}:latest -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  vulnerabilities-scan:
    name: vulnerabilities-scan
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS vulnerability scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "true"
          malwareScan: "false"
          secretsScan: "false"
      - name: Summarize vulnerabilities
        if: always()
        run: |
          sudo apt-get install -y jq -qq
          {
            echo "## 🔍 Vulnerability Scan"
            echo ""
            if [ ! -f tmas_scan_report.json ]; then
              echo "> ⚠️ No scan output — check the TMAS vulnerability scan step log."
              exit 0
            fi
            TOTAL=$(jq -r '.vulnerabilities.totalVulnCount // 0' tmas_scan_report.json)
            CRITICAL=$(jq -r '.vulnerabilities.criticalCount // 0' tmas_scan_report.json)
            HIGH=$(jq -r '.vulnerabilities.highCount // 0' tmas_scan_report.json)
            MEDIUM=$(jq -r '.vulnerabilities.mediumCount // 0' tmas_scan_report.json)
            LOW=$(jq -r '.vulnerabilities.lowCount // 0' tmas_scan_report.json)
            NEGLIGIBLE=$(jq -r '.vulnerabilities.negligibleCount // 0' tmas_scan_report.json)

            if [ "$TOTAL" = "0" ]; then
              echo "### ✅ No vulnerabilities found"
            else
              echo "### Summary"
              echo ""
              echo "| 🔴 Critical | 🟠 High | 🟡 Medium | 🔵 Low | ⚪ Negligible | Total |"
              echo "|:-----------:|:-------:|:---------:|:------:|:-------------:|:-----:|"
              echo "| $CRITICAL | $HIGH | $MEDIUM | $LOW | $NEGLIGIBLE | **$TOTAL** |"
              echo ""
              echo "### Findings"
              echo ""
              echo "| Severity | Advisory | CVE | Package | Version | CVSS | Fix | Location |"
              echo "|----------|----------|-----|---------|---------|------|-----|----------|"
              for SEV in Critical High Medium Low Negligible; do
                jq -r --arg sev "$SEV" '
                  .vulnerabilities.findings[$sev][]? |
                  [
                    $sev,
                    .id,
                    (.source // ""),
                    ((.relatedVulnerabilities // [])[0].id // "—"),
                    .name,
                    .version,
                    ((.cvssSummaries // [])[0].cvssMetrics.cvssBaseScore // "—"),
                    (.fix // "—"),
                    ((.locations // [])[0] // "—")
                  ] | @tsv
                ' tmas_scan_report.json | while IFS=$'\t' read -r sev id src cve pkg ver score fix loc; do
                  case "$sev" in Critical) icon="🔴";; High) icon="🟠";; Medium) icon="🟡";; Low) icon="🔵";; *) icon="⚪";; esac
                  link="[$id]($src)"
                  [ "$src" = "" ] && link="$id"
                  [ "$fix" = "not-fixed" ] && fix="—"
                  echo "| $icon $sev | $link | $cve | \`$pkg\` | $ver | $score | $fix | \`$loc\` |"
                done
              done
            fi
          } >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  malware-scan:
    name: malware-scan
    needs: vulnerabilities-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      malware_found: ${{ steps.set_status.outputs.malware_found }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load image
        run: docker load -i image.tar
      - name: TMAS malware scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "docker:${{ env.IMAGE_NAME }}:latest"
          vulnerabilitiesScan: "false"
          malwareScan: "true"
          secretsScan: "false"
      - name: Summarize malware
        if: always()
        run: |
          sudo apt-get install -y jq -qq
          {
            echo "## 🛡️ Malware Scan"
            echo ""
            if [ ! -f tmas_scan_report.json ]; then
              echo "> ⚠️ No scan output — check the TMAS malware scan step log."
              exit 0
            fi
            RESULT=$(jq -r '.malware.scanResult // 1' tmas_scan_report.json)
            SCAN_ID=$(jq -r '.malware.scanID // "—"' tmas_scan_report.json)
            SCANNER_VER=$(jq -r '.malware.scannerVersion // "—"' tmas_scan_report.json)
            COUNT=$(jq -r '(.malware.findings // []) | length' tmas_scan_report.json 2>/dev/null || echo "0")
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Result | $([ "$RESULT" = "0" ] && echo "✅ Clean" || echo "❌ Malware detected") |"
            echo "| Findings | $COUNT |"
            echo "| Scan ID | \`$SCAN_ID\` |"
            echo "| Scanner version | $SCANNER_VER |"
            if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
              echo ""
              echo "### ❌ Detections"
              echo "| File | Path | Malware name |"
              echo "|------|------|--------------|"
              jq -r '(.malware.findings // [])[]? | "| \(.fileName // "—") | \(.path // "—") | \(.malwareName // "—") |"' tmas_scan_report.json
            fi
          } >> $GITHUB_STEP_SUMMARY
      - name: Set malware status output
        id: set_status
        if: always()
        run: |
          COUNT="0"
          if [ -f tmas_scan_report.json ]; then
            COUNT=$(jq -r '(.malware.findings // []) | length' tmas_scan_report.json 2>/dev/null || echo "0")
            [ "$COUNT" = "null" ] && COUNT=0
          fi
          FOUND="false"
          [ "${COUNT:-0}" -gt 0 ] 2>/dev/null && FOUND="true"
          echo "malware_found=$FOUND" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: malware-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  secrets-scan:
    name: secrets-scan
    needs: malware-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS secrets scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "false"
          malwareScan: "false"
          secretsScan: "true"
      - name: Summarize secrets
        if: always()
        run: |
          sudo apt-get install -y jq -qq
          {
            echo "## 🔒 Secrets Scan"
            echo ""
            if [ ! -f tmas_scan_report.json ]; then
              echo "> ⚠️ No scan output — check the TMAS secrets scan step log."
              exit 0
            fi
            FILES=$(jq -r '.secrets.totalFilesScanned // "—"' tmas_scan_report.json)
            COUNT=$(jq -r '.secrets.unmitigatedFindingsCount // 0' tmas_scan_report.json)
            OVERRIDDEN=$(jq -r '.secrets.overriddenFindingsCount // 0' tmas_scan_report.json)
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Files scanned | $FILES |"
            echo "| Unmitigated secrets | $COUNT |"
            echo "| Overridden / suppressed | $OVERRIDDEN |"
            if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
              echo ""
              echo "### ❌ Findings"
              echo "| Rule ID | File | Line |"
              echo "|---------|------|------|"
              jq -r '.secrets.findings.unmitigated[]? | "| \(.ruleID // .ruleId // "—") | \(.location.path // "—") | \(.location.startLine // "—") |"' tmas_scan_report.json
            else
              echo ""
              echo "✅ No secrets found."
            fi
          } >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  sbom-scan:
    name: sbom-scan
    needs: secrets-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS SBOM scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "true"
          malwareScan: "false"
          secretsScan: "false"
          additionalArgs: "--saveSBOM"
      - name: Summarize SBOM
        if: always()
        run: |
          sudo apt-get install -y jq -qq
          {
            echo "## 📋 SBOM"
            echo ""
            if [ ! -f tmas_scan_report.json ]; then
              echo "> ⚠️ No SBOM output — check the TMAS SBOM scan step log."
              exit 0
            fi
            echo "✅ SBOM generated. Download the **sbom-scan-results** artifact for the full JSON."
            SBOM_FILE=$(ls SBOM_*.json 2>/dev/null | head -1)
            if [ -n "$SBOM_FILE" ]; then
              COMP=$(jq '.components | length' "$SBOM_FILE" 2>/dev/null || echo "—")
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Components | $COMP |"
              echo "| File | \`$SBOM_FILE\` |"
            fi
          } >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
            SBOM_*.json
          if-no-files-found: ignore

  report:
    name: report
    needs: [build, vulnerabilities-scan, malware-scan, secrets-scan, sbom-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-scan-results'
          path: scan-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Generate pipeline report
        run: |
          sudo apt-get install -y jq -qq
          BUILD="${{ needs.build.result }}"
          VULN="${{ needs.vulnerabilities-scan.result }}"
          MAL="${{ needs.malware-scan.result }}"
          SEC="${{ needs.secrets-scan.result }}"
          SBOM="${{ needs.sbom-scan.result }}"
          MALWARE_FOUND="${{ needs.malware-scan.outputs.malware_found }}"
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac }

          VULN_JSON="scan-artifacts/vulnerability-scan-results/tmas_scan_report.json"
          MAL_JSON="scan-artifacts/malware-scan-results/tmas_scan_report.json"
          SEC_JSON="scan-artifacts/secrets-scan-results/tmas_scan_report.json"

          # Collect stats
          CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0; TOTAL_VULNS=0
          if [ -f "$VULN_JSON" ]; then
            CRITICAL=$(jq -r '.vulnerabilities.criticalCount // 0' "$VULN_JSON")
            HIGH=$(jq -r '.vulnerabilities.highCount // 0' "$VULN_JSON")
            MEDIUM=$(jq -r '.vulnerabilities.mediumCount // 0' "$VULN_JSON")
            LOW=$(jq -r '.vulnerabilities.lowCount // 0' "$VULN_JSON")
            TOTAL_VULNS=$(jq -r '.vulnerabilities.totalVulnCount // 0' "$VULN_JSON")
          fi
          SECRETS_COUNT=0; FILES_SCANNED=0
          if [ -f "$SEC_JSON" ]; then
            SECRETS_COUNT=$(jq -r '.secrets.unmitigatedFindingsCount // 0' "$SEC_JSON")
            FILES_SCANNED=$(jq -r '.secrets.totalFilesScanned // 0' "$SEC_JSON")
          fi
          MAL_RESULT="—"; MAL_SCANNER="—"
          if [ -f "$MAL_JSON" ]; then
            MAL_RESULT=$(jq -r 'if .malware.scanResult == 0 then "✅ Clean" else "❌ Detected" end' "$MAL_JSON")
            MAL_SCANNER=$(jq -r '.malware.scannerVersion // "—"' "$MAL_JSON")
          fi

          # Overall status
          OVERALL="✅ PASSED"
          [ "$MALWARE_FOUND" = "true" ] && OVERALL="❌ FAILED — malware detected"
          [ "$CRITICAL" -gt 0 ] 2>/dev/null && OVERALL="❌ FAILED — critical vulnerabilities"
          [ "$SECRETS_COUNT" -gt 0 ] 2>/dev/null && OVERALL="⚠️ REVIEW — secrets found"

          {
            echo "# 📋 TMAS Security Report"
            echo ""
            echo "> **$OVERALL**  ·  Commit: \`${{ github.sha }}\`  ·  Branch: \`${{ github.ref_name }}\`"
            echo ""
            echo "## Pipeline Status"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| 🔨 Build | $(icon $BUILD) |"
            echo "| 🔍 Vulnerabilities | $(icon $VULN) |"
            echo "| 🛡️ Malware | $(icon $MAL) |"
            echo "| 🔒 Secrets | $(icon $SEC) |"
            echo "| 📋 SBOM | $(icon $SBOM) |"
            echo ""
            echo "---"
            echo "## Scan Results at a Glance"
            echo ""
            echo "| | Vulnerabilities | | | | Malware | Secrets |"
            echo "|---|:---:|:---:|:---:|:---:|:---:|:---:|"
            echo "| | 🔴 Critical | 🟠 High | 🟡 Medium | 🔵 Low | 🛡️ Result | 🔒 Found |"
            echo "| Count | $CRITICAL | $HIGH | $MEDIUM | $LOW | $MAL_RESULT | $SECRETS_COUNT |"
            echo ""
            echo "---"
            echo "## 🔍 Vulnerability Details"
            echo ""
            if [ -f "$VULN_JSON" ] && [ "$TOTAL_VULNS" -gt 0 ]; then
              echo "**$TOTAL_VULNS findings** across $CRITICAL critical, $HIGH high, $MEDIUM medium, $LOW low"
              echo ""
              echo "| Severity | Advisory | CVE | Package | Version | CVSS | Fix | Location |"
              echo "|----------|----------|-----|---------|---------|:----:|-----|----------|"
              for SEV in Critical High Medium Low Negligible; do
                jq -r --arg sev "$SEV" '
                  .vulnerabilities.findings[$sev][]? |
                  [
                    $sev,
                    .id,
                    (.source // ""),
                    ((.relatedVulnerabilities // [])[0].id // "—"),
                    .name,
                    .version,
                    ((.cvssSummaries // [])[0].cvssMetrics.cvssBaseScore // "—"),
                    (.fix // "—"),
                    ((.locations // [])[0] // "—")
                  ] | @tsv
                ' "$VULN_JSON" | while IFS=$'\t' read -r sev id src cve pkg ver score fix loc; do
                  case "$sev" in Critical) ico="🔴";; High) ico="🟠";; Medium) ico="🟡";; Low) ico="🔵";; *) ico="⚪";; esac
                  [ "$src" != "" ] && advisory="[$id]($src)" || advisory="$id"
                  [ "$fix" = "not-fixed" ] && fix="—"
                  echo "| $ico $sev | $advisory | $cve | \`$pkg\` | $ver | $score | $fix | \`$loc\` |"
                done
              done
            else
              echo "✅ No vulnerabilities found."
            fi
            echo ""
            echo "---"
            echo "## 🛡️ Malware Details"
            echo ""
            if [ -f "$MAL_JSON" ]; then
              MAL_ID=$(jq -r '.malware.scanID // "—"' "$MAL_JSON")
              echo "| Result | Scan ID | Scanner version |"
              echo "|--------|---------|-----------------|"
              echo "| $MAL_RESULT | \`$MAL_ID\` | $MAL_SCANNER |"
            else
              echo "> ⚠️ No malware scan data available."
            fi
            echo ""
            echo "---"
            echo "## 🔒 Secrets Details"
            echo ""
            if [ -f "$SEC_JSON" ]; then
              echo "| Files scanned | Unmitigated secrets | Overridden |"
              echo "|:-------------:|:-------------------:|:----------:|"
              OVR=$(jq -r '.secrets.overriddenFindingsCount // 0' "$SEC_JSON")
              echo "| $FILES_SCANNED | $SECRETS_COUNT | $OVR |"
              if [ "$SECRETS_COUNT" -gt 0 ] 2>/dev/null; then
                echo ""
                echo "| Rule ID | File | Line |"
                echo "|---------|------|------|"
                jq -r '.secrets.findings.unmitigated[]? | "| \(.ruleID // "—") | \(.location.path // "—") | \(.location.startLine // "—") |"' "$SEC_JSON"
              fi
            else
              echo "> ⚠️ No secrets scan data available."
            fi
            echo ""
            echo "---"
            echo "_📥 Full JSON reports available in the workflow artifacts: \`vulnerability-scan-results\`, \`malware-scan-results\`, \`secrets-scan-results\`, \`sbom-scan-results\`_"
          } >> $GITHUB_STEP_SUMMARY
