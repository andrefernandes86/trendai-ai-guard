name: TMAS Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tmas-scan:
    name: Artifact Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Lambda container image
        run: |
          cat > Dockerfile.scan <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/python:3.12
          COPY src/requirements.txt .
          RUN pip install -r requirements.txt -t "${LAMBDA_TASK_ROOT}"
          COPY src/ ${LAMBDA_TASK_ROOT}/
          DOCKERFILE
          docker build -f Dockerfile.scan -t trendai-ai-guard:${{ github.sha }} .

      - name: Run TMAS Scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          artifact: docker://trendai-ai-guard:${{ github.sha }}
          vulnerabilitiesScan: "true"
          secretsScan: "true"
          malwareScan: "true"
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
