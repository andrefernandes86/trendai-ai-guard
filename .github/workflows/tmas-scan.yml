name: TMAS Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: trendai-ai-guard

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Lambda container image
        run: |
          cat > Dockerfile.scan <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/python:3.12
          COPY src/requirements.txt .
          RUN pip install -r requirements.txt -t "${LAMBDA_TASK_ROOT}"
          COPY src/ ${LAMBDA_TASK_ROOT}/
          DOCKERFILE
          docker build -f Dockerfile.scan -t ${{ env.IMAGE_NAME }}:latest .
          docker save ${{ env.IMAGE_NAME }}:latest -o image.tar
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  vulnerabilities-scan:
    name: vulnerabilities-scan
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS vulnerability scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "true"
          malwareScan: "false"
          secretsScan: "false"
      - name: Summarize vulnerabilities
        if: always()
        run: |
          echo "## 🔍 Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ ! -f tmas_scan_report.json ]; then
            echo "⚠️ No scan output. Check the TMAS vulnerability scan step log." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          CRITICAL=$(jq -r '.vulnerabilities.criticalCount // 0' tmas_scan_report.json)
          HIGH=$(jq -r '.vulnerabilities.highCount // 0' tmas_scan_report.json)
          MEDIUM=$(jq -r '.vulnerabilities.mediumCount // 0' tmas_scan_report.json)
          LOW=$(jq -r '.vulnerabilities.lowCount // 0' tmas_scan_report.json)
          printf "| Severity | Count |\n|----------|-------|\n| Critical | %s |\n| High | %s |\n| Medium | %s |\n| Low | %s |\n" \
            "$CRITICAL" "$HIGH" "$MEDIUM" "$LOW" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  malware-scan:
    name: malware-scan
    needs: vulnerabilities-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      malware_found: ${{ steps.set_status.outputs.malware_found }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load image
        run: docker load -i image.tar
      - name: TMAS malware scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "docker:${{ env.IMAGE_NAME }}:latest"
          vulnerabilitiesScan: "false"
          malwareScan: "true"
          secretsScan: "false"
      - name: Summarize malware
        if: always()
        run: |
          echo "## 🛡️ Malware Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ ! -f tmas_scan_report.json ]; then
            echo "⚠️ No scan output. Check the TMAS malware scan step log." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          COUNT=$(jq -r '.malware.count // 0' tmas_scan_report.json)
          [ "$COUNT" = "null" ] && COUNT=0
          if [ "$COUNT" -gt 0 ] 2>/dev/null; then
            echo "❌ **$COUNT malware detection(s)**" >> $GITHUB_STEP_SUMMARY
            echo "| File | Path | Malware |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
            jq -r '(.malware.findings // [])[]? | "| \(.fileName // "—") | \(.path // "—") | \(.malwareName // "—") |"' tmas_scan_report.json >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No malware detected." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Set malware status output
        id: set_status
        if: always()
        run: |
          COUNT="0"
          if [ -f tmas_scan_report.json ]; then
            COUNT=$(jq -r '.malware.count // 0' tmas_scan_report.json 2>/dev/null || echo "0")
            [ "$COUNT" = "null" ] && COUNT=0
          fi
          FOUND="false"
          [ "${COUNT:-0}" -gt 0 ] 2>/dev/null && FOUND="true"
          echo "malware_found=$FOUND" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: malware-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  secrets-scan:
    name: secrets-scan
    needs: malware-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS secrets scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "false"
          malwareScan: "false"
          secretsScan: "true"
      - name: Summarize secrets
        if: always()
        run: |
          echo "## 🔒 Secrets Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ ! -f tmas_scan_report.json ]; then
            echo "⚠️ No scan output. Check the TMAS secrets scan step log." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          COUNT=$(jq -r '.secrets.unmitigatedFindingsCount // 0' tmas_scan_report.json)
          [ "$COUNT" = "null" ] && COUNT=0
          if [ "$COUNT" -gt 0 ] 2>/dev/null; then
            echo "❌ **$COUNT secret(s) found**" >> $GITHUB_STEP_SUMMARY
            echo "| Rule ID | Location |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.secrets.findings.unmitigated[]? | "| \(.ruleID // "—") | \(.location.path // "—") |"' tmas_scan_report.json >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets found." >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
          if-no-files-found: ignore

  sbom-scan:
    name: sbom-scan
    needs: secrets-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: TMAS SBOM scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifact: "dir:."
          vulnerabilitiesScan: "true"
          malwareScan: "false"
          secretsScan: "false"
          additionalArgs: "--saveSBOM"
      - name: Summarize SBOM
        if: always()
        run: |
          echo "## 📋 SBOM Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f tmas_scan_report.json ]; then
            echo "✅ SBOM generated. Download the **sbom-scan-results** artifact for full details." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No SBOM output. Check the TMAS SBOM scan step log." >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-scan-results
          path: |
            scan-report.md
            tmas_scan_report.json
            SBOM_*.json
          if-no-files-found: ignore

  report:
    name: report
    needs: [build, vulnerabilities-scan, malware-scan, secrets-scan, sbom-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-scan-results'
          path: scan-artifacts
          merge-multiple: false
        continue-on-error: true
      - name: Generate pipeline report
        run: |
          BUILD="${{ needs.build.result }}"
          VULN="${{ needs.vulnerabilities-scan.result }}"
          MAL="${{ needs.malware-scan.result }}"
          SEC="${{ needs.secrets-scan.result }}"
          SBOM="${{ needs.sbom-scan.result }}"
          MALWARE_FOUND="${{ needs.malware-scan.outputs.malware_found }}"
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac; }
          {
            echo "# 📋 TMAS Pipeline Report"
            echo ""
            echo "| Build | Vulnerabilities | Malware | Secrets | SBOM |"
            echo "|-------|-----------------|---------|---------|------|"
            echo "| $(icon $BUILD) | $(icon $VULN) | $(icon $MAL) | $(icon $SEC) | $(icon $SBOM) |"
            echo ""
            if [ "$MALWARE_FOUND" = "true" ]; then
              echo "⛔ **Malware detected** — review malware-scan-results artifact before deploying."
            else
              echo "✅ No malware detected."
            fi
            echo ""
            echo "📥 **Artifacts:** \`vulnerability-scan-results\`, \`malware-scan-results\`, \`secrets-scan-results\`, \`sbom-scan-results\`"
          } >> $GITHUB_STEP_SUMMARY
